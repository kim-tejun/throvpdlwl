<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Interactive Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>

    <header class="hero">
        <div class="hero-content">
            <h1 class="typing-text">안녕하세요! <span class="highlight">김태준</span>이에요.</h1>
            <p class="subtitle fade-in-up">Creative Developer & Designer</p>
            <a href="#about" class="btn bounce">Scroll Down</a>
        </div>
    </header>

    <section id="about" class="section">
        <div class="container scroll-trigger">
            <h2>About Me</h2>
            <p>대단한 페이지 만들기를 꿈꾸는 평범한 고등학생</p>
            
            <div class="card-grid">
                <div class="card scroll-trigger">
                    <h3>Design</h3>
                    <p>아름답고 사용자 중심 디자인을 만들어요.</p>
                </div>
                <div class="card scroll-trigger delay-1">
                    <h3>Code & HTML</h3>
                    <p>깔끔하고 효율적인 페이지를 만들어요.</p>
                </div>
                <div class="card scroll-trigger delay-2">
                    <h3>Animate</h3>
                    <p>CSS를 이용해 애니메이션을 만들어요.</p>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
